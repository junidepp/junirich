name: Daily NDX Pattern Analysis

on:
 # schedule: (cron org를 써서 자체 cron 기능 삭제함)
   # 한국시간 오전 9시, 11시, 오후 1시에 시도 (GitHub Actions 지연 대비)
   # - cron: '0 0 * * *'    # 한국 09:00 (UTC 00:00)
   # - cron: '0 2 * * *'    # 한국 11:00 (UTC 02:00)
   # - cron: '0 4 * * *'    # 한국 13:00 (UTC 04:00)
  workflow_dispatch:  # 수동 실행 버튼 (테스트용)

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy

      - name: Run pattern analysis
        run: python scripts/analyze.py

      - name: Commit and push results
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Daily analysis: $(date -u +%Y-%m-%d)"
            git push
          fi
