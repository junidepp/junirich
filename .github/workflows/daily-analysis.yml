name: Daily NDX Pattern Analysis

on:
  schedule:
    # 매일 한국시간 오전 7시 (UTC 22:00) 실행
    - cron: '0 22 * * *'
  workflow_dispatch:  # 수동 실행 버튼 (테스트용)

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy

      - name: Run pattern analysis
        run: python scripts/analyze.py

      - name: Commit and push results
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add data/result.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Daily analysis: $(date -u +%Y-%m-%d)"
            git push
          fi
